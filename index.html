<html lang="it">
<script>
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');

                        card: '#1a1a1a',

    <style>

    <script>
        /** ==============================
         *  GOOGLE DRIVE API
         * ============================== */
        const CLIENT_ID = '662737937491-or1uo1ui8eohrf7il2s8cve0in8pu4od.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyBJ9w0ilvQohKTO1agou-xs3-_ogyz2iIk';
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
        const BACKUP_NAME = 'carodiario_backup.json';

        let tokenClient;
        let gapiInited = false;
        let gisInited = false;

        function gapiLoaded() {
            gapi.load('client', async () => {
                if (!API_KEY) return;
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
                gapiInited = true;
                checkAuthReady();
            });
        }

        function gisLoaded() {
            if (!CLIENT_ID) return;
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (resp) => {
                    if (resp.error) { console.error(resp); showToast('Errore di autenticazione Google.', true); return; }
                    const expiresAt = Date.now() + (resp.expires_in * 1000);
                    localStorage.setItem('gdrive_token', resp.access_token);
                    localStorage.setItem('gdrive_token_expires', expiresAt.toString());
                    gapi.client.setToken({ access_token: resp.access_token });
                    updateCloudUI(true);
                    showToast('Connesso a Google Drive ✓');
                },
            });
            gisInited = true;
            checkAuthReady();
        }

        function checkAuthReady() {
            if (gapiInited && gisInited) {
                const savedToken = localStorage.getItem('gdrive_token');
                const expiresAt = localStorage.getItem('gdrive_token_expires');
                if (savedToken && expiresAt && Date.now() < parseInt(expiresAt)) {
                    gapi.client.setToken({ access_token: savedToken });
                    updateCloudUI(true);
                    // Aggiorna l'etichetta con l'utente se disponibile
                } else {
                    localStorage.removeItem('gdrive_token');
                    localStorage.removeItem('gdrive_token_expires');
                    updateCloudUI(false);
                }
            }
        }

        function updateCloudUI(isAuthed) {
            document.getElementById('auth_btn').classList.toggle('hidden', isAuthed);
            document.getElementById('signout_btn').classList.toggle('hidden', !isAuthed);
            document.getElementById('save_drive_btn').disabled = !isAuthed;
            document.getElementById('load_drive_btn').disabled = !isAuthed;
            const dot = document.getElementById('cloud-status-indicator');
            dot.className = `absolute top-1.5 right-1.5 w-1.5 h-1.5 rounded-full ${isAuthed ? 'bg-emerald-500' : 'bg-gray-300'}`;
            dot.classList.remove('syncing');
        }

        function handleAuthClick() {
            if (!tokenClient) { showToast('API Google non ancora caricata, riprova.', true); return; }
            const currentToken = gapi.client.getToken();
            tokenClient.requestAccessToken({ prompt: currentToken === null ? 'consent' : '' });
        }

        function handleSignoutClick() {
            const token = gapi.client.getToken();
            if (token) {
                google.accounts.oauth2.revoke(token.access_token, () => {});
                gapi.client.setToken('');
            }
            localStorage.removeItem('gdrive_token');
            localStorage.removeItem('gdrive_token_expires');
            updateCloudUI(false);
            showToast('Disconnesso da Google Drive.');
        }

        /** FIX PRINCIPALE: usa fetch diretto invece di gapi.client per upload/download
         *  gapi.client non gestisce correttamente il multipart upload né il download con alt=media */
        async function getValidToken() {
            const savedToken = localStorage.getItem('gdrive_token');
            const expiresAt = localStorage.getItem('gdrive_token_expires');
            if (savedToken && expiresAt && Date.now() < parseInt(expiresAt) - 60000) {
                return savedToken;
            }
            // Token scaduto: richiedi il refresh
            return new Promise((resolve, reject) => {
                tokenClient.callback = (resp) => {
                    if (resp.error) { reject(resp); return; }
                    const newExpiry = Date.now() + (resp.expires_in * 1000);
                    localStorage.setItem('gdrive_token', resp.access_token);
                    localStorage.setItem('gdrive_token_expires', newExpiry.toString());
                    gapi.client.setToken({ access_token: resp.access_token });
                    resolve(resp.access_token);
                };
                tokenClient.requestAccessToken({ prompt: '' });
            });
        }

        async function saveToDrive() {
            const indicator = document.getElementById('cloud-status-indicator');
            indicator.classList.add('syncing');
            try {
                const token = await getValidToken();

                // Cerca file esistente
                const listRes = await fetch(
                    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%27${BACKUP_NAME}%27&fields=files(id)`,
                    { headers: { Authorization: 'Bearer ' + token } }
                );
                const listData = await listRes.json();
                const fileId = listData.files && listData.files.length > 0 ? listData.files[0].id : null;

                const fileContent = JSON.stringify({ version: 1, exportDate: new Date().toISOString(), journals });

                if (fileId) {
                    // PATCH: aggiorna solo il contenuto (metadata già settati)
                    const patchRes = await fetch(
                        `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
                        {
                            method: 'PATCH',
                            headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
                            body: fileContent
                        }
                    );
                    if (!patchRes.ok) throw new Error(await patchRes.text());
                } else {
                    // POST: crea nuovo file in appDataFolder con multipart
                    const metadata = { name: BACKUP_NAME, mimeType: 'application/json', parents: ['appDataFolder'] };
                    const boundary = 'backup_boundary_carodiario';
                    const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${fileContent}\r\n--${boundary}--`;

                    const postRes = await fetch(
                        'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
                        {
                            method: 'POST',
                            headers: {
                                Authorization: 'Bearer ' + token,
                                'Content-Type': `multipart/related; boundary=${boundary}`
                            },
                            body
                        }
                    );
                    if (!postRes.ok) throw new Error(await postRes.text());
                }

                updateCloudUI(true);
                showToast('Backup salvato su Google Drive ✓');
            } catch (e) {
                console.error('saveToDrive error:', e);
                updateCloudUI(!!localStorage.getItem('gdrive_token'));
                showToast('Errore nel backup. Riprova o rifai il login.', true);
            }
        }

        async function loadFromDrive() {
            showConfirm("Questo sovrascriverà tutti i dati locali. Procedere?", async () => {
                const indicator = document.getElementById('cloud-status-indicator');
                indicator.classList.add('syncing');
                try {
                    const token = await getValidToken();

                    // Lista il file
                    const listRes = await fetch(
                        `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%27${BACKUP_NAME}%27&fields=files(id)`,
                        { headers: { Authorization: 'Bearer ' + token } }
                    );
                    const listData = await listRes.json();

                    if (!listData.files || listData.files.length === 0) {
                        updateCloudUI(true);
                        showToast('Nessun backup trovato su questo account.', true);
                        return;
                    }

                    // Scarica il contenuto direttamente con fetch (alt=media)
                    const fileId = listData.files[0].id;
                    const dlRes = await fetch(
                        `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
                        { headers: { Authorization: 'Bearer ' + token } }
                    );
                    if (!dlRes.ok) throw new Error(await dlRes.text());

                    const parsed = await dlRes.json();

                    // Supporta sia il formato nuovo { version, journals } sia il vecchio array diretto
                    const data = Array.isArray(parsed) ? parsed : (parsed.journals || []);

                    if (!Array.isArray(data)) throw new Error('Formato backup non valido.');

                    journals = data;
                    activeJournalId = journals[0]?.id || null;
                    saveData();
                    renderApp();
                    updateCloudUI(true);
                    showToast('Dati ripristinati da Google Drive ✓');
                } catch (e) {
                    console.error('loadFromDrive error:', e);
                    updateCloudUI(!!localStorage.getItem('gdrive_token'));
                    showToast('Errore nel ripristino. Riprova.', true);
                }
            });
        }


        /** ==============================
         *  EXPORT / IMPORT JSON
         * ============================== */
        function exportJSON() {
            const payload = { version: 1, exportDate: new Date().toISOString(), journals };
            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const date = new Date().toISOString().slice(0, 10);
            a.href = url;
            a.download = `carodiario_backup_${date}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Backup JSON esportato ✓');
        }

        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const parsed = JSON.parse(e.target.result);
                    // Supporta sia { version, journals } sia array diretto
                    const data = Array.isArray(parsed) ? parsed : (parsed.journals || null);
                    if (!Array.isArray(data)) throw new Error('Struttura non valida');

                    showConfirm("Importare il backup? Sostituirà tutti i dati attuali.", () => {
                        journals = data;
                        activeJournalId = journals[0]?.id || null;
                        saveData();
                        renderApp();
                        showToast('Dati importati correttamente ✓');
                    });
                } catch (err) {
                    showToast('File non valido o corrotto.', true);
                }
            };
            reader.readAsText(file);
            // Reset input so same file can be re-imported
            event.target.value = '';
        }


        /** ==============================
         *  CORE APP LOGIC
         * ============================== */
        let journals = JSON.parse(localStorage.getItem('carodiario_data')) || [];
        let activeJournalId = localStorage.getItem('carodiario_active_id') || null;
        let currentPageId = null;
        let confirmCallback = null;

        const pagesView = document.getElementById('pages-view');
        const currentTitleText = document.getElementById('current-title-text');
        const titleInput = document.getElementById('title-input');
        const journalListEl = document.getElementById('journal-list');
        const editorBackdrop = document.getElementById('editor-backdrop');
        const editorContainer = document.getElementById('editor-container');
        const editorTitle = document.getElementById('editor-title');
        const editorContent = document.getElementById('editor-content');
        const editorDatetime = document.getElementById('editor-datetime');

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // Toast
        let toastTimeout;
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.backgroundColor = isError ? '#ef4444' : '';
            toast.style.color = isError ? 'white' : '';
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function renderApp() { renderHeader(); renderPagesGrid(); }

        function renderHeader() {
            const journal = journals.find(j => j.id === activeJournalId);
            currentTitleText.innerText = journal?.title || 'Nessun Diario';
            document.getElementById('edit-title-btn').classList.toggle('hidden', !journal);
            document.getElementById('dropdown-delete-section').classList.toggle('hidden', !journal);

            journalListEl.innerHTML = journals
                .sort((a, b) => b.timestamp - a.timestamp)
                .map(j => `
                    <li onclick="selectJournal('${j.id}')" class="px-3 py-2 rounded-xl cursor-pointer truncate text-sm ${j.id === activeJournalId ? 'bg-gray-900 text-white dark:bg-gray-800 dark:text-white font-medium' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800/50'}">
                        ${escapeHTML(j.title) || 'Senza Titolo'}
                    </li>`).join('') || '<li class="text-center text-xs text-gray-400 py-2 italic">Nessun diario</li>';
        }

        function renderPagesGrid() {
            pagesView.innerHTML = '';
            document.getElementById('no-journals-hint').classList.toggle('hidden', journals.length > 0);
            const journal = journals.find(j => j.id === activeJournalId);
            if (!journal) return;
            document.getElementById('empty-journal-hint').classList.toggle('hidden', journal.pages.length > 0);

            const sorted = [...journal.pages].sort((a, b) => b.timestamp - a.timestamp);
            let curDate = ''; let curGrid = null;

            sorted.forEach(p => {
                const dateStr = new Date(p.timestamp).toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
                if (dateStr !== curDate) {
                    const h = document.createElement('h2');
                    h.className = 'w-full text-xs font-semibold tracking-widest uppercase text-gray-400 dark:text-gray-700 mt-6 mb-3 border-b border-gray-100 dark:border-gray-900 pb-2';
                    h.innerText = dateStr;
                    pagesView.appendChild(h);
                    curGrid = document.createElement('div');
                    curGrid.className = 'grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 mb-6';
                    pagesView.appendChild(curGrid);
                    curDate = dateStr;
                }
                const card = document.createElement('div');
                card.className = 'note-card bg-white dark:bg-card border border-gray-100 dark:border-transparent hover:border-gray-200 dark:hover:border-gray-800 transition-all rounded-2xl p-5 h-44 flex flex-col cursor-pointer group shadow-sm hover:shadow-md';
                card.onclick = () => openPage(p.id);
                card.innerHTML = `
                    <div class="font-serif text-base text-gray-900 dark:text-gray-200 truncate mb-1.5">${escapeHTML(p.title) || '<span class="text-gray-300 dark:text-gray-700 font-sans text-sm italic">Senza titolo</span>'}</div>
                    <div class="text-gray-500 dark:text-gray-500 text-sm leading-relaxed flex-grow overflow-hidden line-clamp-4 font-playfair">${escapeHTML(p.content) || '<span class="opacity-40 italic font-sans text-xs">Vuota</span>'}</div>
                    <div class="mt-3 flex justify-between items-center text-[10px] text-gray-300 dark:text-gray-700 border-t border-gray-50 dark:border-gray-800/50 pt-2.5">
                        <span>${new Date(p.timestamp).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' })}</span>
                        <button onclick="event.stopPropagation(); showConfirm('Eliminare la pagina?', ()=>deletePage('${p.id}'))" class="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600 transition-all">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>`;
                curGrid.appendChild(card);
            });
        }

        // Dropdown toggles
        function toggleDropdown(e) {
            e.stopPropagation();
            document.getElementById('cloud-dropdown').classList.add('dropdown-hidden');
            document.getElementById('cloud-dropdown').classList.remove('dropdown-visible');
            document.getElementById('journal-dropdown').classList.toggle('dropdown-hidden');
            document.getElementById('journal-dropdown').classList.toggle('dropdown-visible');
        }
        function toggleCloudDropdown(e) {
            e.stopPropagation();
            document.getElementById('journal-dropdown').classList.add('dropdown-hidden');
            document.getElementById('journal-dropdown').classList.remove('dropdown-visible');
            document.getElementById('cloud-dropdown').classList.toggle('dropdown-hidden');
            document.getElementById('cloud-dropdown').classList.toggle('dropdown-visible');
        }
        document.addEventListener('click', () => {
            document.getElementById('journal-dropdown').classList.add('dropdown-hidden');
            document.getElementById('journal-dropdown').classList.remove('dropdown-visible');
            document.getElementById('cloud-dropdown').classList.add('dropdown-hidden');
            document.getElementById('cloud-dropdown').classList.remove('dropdown-visible');
        });
        document.getElementById('cloud-dropdown').addEventListener('click', e => e.stopPropagation());
        document.getElementById('journal-dropdown').addEventListener('click', e => e.stopPropagation());

        function selectJournal(id) { activeJournalId = id; saveData(); renderApp(); }
        function createNewJournal() {
            const id = Date.now().toString();
            journals.push({ id, title: 'Nuovo Diario', timestamp: Date.now(), pages: [] });
            selectJournal(id);
            startEditingTitle();
        }
        function startEditingTitle() {
            document.getElementById('title-view').classList.add('hidden');
            document.getElementById('title-edit').classList.remove('hidden');
            titleInput.value = journals.find(j => j.id === activeJournalId)?.title || '';
            titleInput.focus();
        }
        titleInput.onblur = () => {
            if (activeJournalId) {
                const j = journals.find(j => j.id === activeJournalId);
                if (j) j.title = titleInput.value.trim() || 'Senza Titolo';
                saveData();
            }
            document.getElementById('title-view').classList.remove('hidden');
            document.getElementById('title-edit').classList.add('hidden');
            renderApp();
        };
        titleInput.onkeydown = (e) => { if (e.key === 'Enter') titleInput.blur(); };

        function deleteActiveJournal() {
            showConfirm("Eliminare l'intero diario e tutte le sue pagine?", () => {
                journals = journals.filter(j => j.id !== activeJournalId);
                activeJournalId = journals[0]?.id || null;
                saveData(); renderApp();
            });
        }

        function openNewPage() {
            const journal = journals.find(j => j.id === activeJournalId);
            if (!journal) return;
            const id = Date.now().toString();
            journal.pages.push({ id, title: '', content: '', timestamp: Date.now() });
            openPage(id);
        }
        function openPage(id) {
            currentPageId = id;
            const p = journals.find(j => j.id === activeJournalId).pages.find(pg => pg.id === id);
            editorTitle.value = p.title;
            editorContent.value = p.content;
            editorDatetime.value = new Date(p.timestamp - (new Date().getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
            showEditor();
        }

        function showEditor() {
            document.body.classList.add('modal-open');
            editorBackdrop.classList.remove('opacity-0', 'pointer-events-none');
            editorBackdrop.classList.add('opacity-100', 'pointer-events-auto');
            editorContainer.classList.remove('scale-95');
            editorContainer.classList.add('scale-100');
            setTimeout(() => editorContent.focus(), 150);
        }
        function closeEditor() {
            document.body.classList.remove('modal-open');
            editorBackdrop.classList.remove('opacity-100', 'pointer-events-auto');
            editorBackdrop.classList.add('opacity-0', 'pointer-events-none');
            editorContainer.classList.remove('scale-100');
            editorContainer.classList.add('scale-95');
            cleanEmptyPages();
            currentPageId = null;
        }

        editorBackdrop.addEventListener('click', (e) => { if (e.target === editorBackdrop) closeEditor(); });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.getElementById('custom-modal-backdrop').classList.contains('opacity-100')) {
                    document.getElementById('modal-cancel').onclick();
                } else if (editorBackdrop.classList.contains('opacity-100')) {
                    closeEditor();
                }
            }
        });

        function deletePage(id) {
            const j = journals.find(j => j.id === activeJournalId);
            j.pages = j.pages.filter(p => p.id !== id);
            saveData(); renderApp();
        }
        function triggerDeletePage(e) {
            e.stopPropagation();
            showConfirm("Vuoi eliminare questa pagina?", () => { deletePage(currentPageId); closeEditor(); });
        }

        function updatePage() {
            if (!currentPageId) return;
            const p = journals.find(j => j.id === activeJournalId).pages.find(pg => pg.id === currentPageId);
            p.title = editorTitle.value;
            p.content = editorContent.value;
            p.timestamp = new Date(editorDatetime.value).getTime();
            saveData(); renderPagesGrid();
        }
        editorTitle.oninput = updatePage;
        editorContent.oninput = updatePage;
        editorDatetime.onchange = updatePage;

        function cleanEmptyPages() {
            const j = journals.find(j => j.id === activeJournalId);
            if (!j) return;
            const before = j.pages.length;
            j.pages = j.pages.filter(p => p.title.trim() || p.content.trim());
            if (j.pages.length !== before) { saveData(); renderPagesGrid(); }
        }

        function saveData() {
            localStorage.setItem('carodiario_data', JSON.stringify(journals));
            localStorage.setItem('carodiario_active_id', activeJournalId);
        }

        function escapeHTML(s) {
            if (!s) return '';
            return s.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
        }

        function showConfirm(m, cb) {
            document.getElementById('modal-message').innerText = m;
            confirmCallback = cb;
            const modal = document.getElementById('custom-modal-backdrop');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.classList.add('opacity-100', 'pointer-events-auto');
            document.getElementById('modal-box').classList.replace('scale-95', 'scale-100');
        }
        document.getElementById('modal-cancel').onclick = () => {
            const modal = document.getElementById('custom-modal-backdrop');
            modal.classList.remove('opacity-100', 'pointer-events-auto');
            modal.classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('modal-box').classList.replace('scale-100', 'scale-95');
        };
        document.getElementById('modal-confirm').onclick = () => {
            if (confirmCallback) confirmCallback();
            document.getElementById('modal-cancel').onclick();
        };

        // Click sulla griglia per nuova pagina
        pagesView.addEventListener('click', (e) => {
            if (document.body.classList.contains('modal-open')) return;
            if (e.target.closest('.note-card')) return;
            if (activeJournalId) openNewPage();
        });

        renderApp();
    </script>
</body>
</html>

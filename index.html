    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');

</script>

<body class="bg-lightBg dark:bg-dark text-gray-800 dark:text-gray-200 font-sans antialiased h-screen flex flex-col overflow-hidden transition-colors duration-300">

        <div class="flex items-center justify-center relative">
            <div id="title-view" class="flex items-center gap-1 md:gap-2">

                </button>
                <div class="flex items-center">
                    <button id="edit-title-btn" onclick="startEditingTitle()" class="p-1.5 text-gray-400 hover:text-gray-900 hover:bg-gray-100 dark:text-gray-500 dark:hover:text-white dark:hover:bg-gray-800 rounded-full transition-colors hidden" title="Modifica titolo">
                        <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                    </button>
                    <button onclick="createNewJournal()" class="p-1.5 text-gray-400 hover:text-gray-900 hover:bg-gray-100 dark:text-gray-500 dark:hover:text-white dark:hover:bg-gray-800 rounded-full transition-colors" title="Crea nuovo diario">
                        <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>

            <div id="title-edit" class="hidden items-center">

            <div id="journal-dropdown" class="absolute top-full left-1/2 mt-3 w-64 bg-white dark:bg-card border border-gray-200 dark:border-gray-700 rounded-xl shadow-xl flex-col z-50 dropdown-hidden">
                <div class="px-4 py-3 text-xs font-bold text-gray-400 dark:text-gray-500 tracking-wider border-b border-gray-100 dark:border-gray-700 text-center uppercase">I Tuoi Diari</div>

                <div id="dropdown-delete-section" class="border-t border-gray-100 dark:border-gray-700 p-2 hidden">
                    <button onclick="deleteActiveJournal()" class="w-full text-left px-3 py-2 text-sm text-red-500 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-400/10 rounded-lg transition-colors flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>

        <div class="flex items-center justify-end gap-3 md:gap-4 text-sm text-gray-500 relative">
            
            <button onclick="toggleCloudDropdown(event)" class="p-2 text-blue-600 hover:bg-blue-50 dark:text-blue-400 dark:hover:bg-blue-900/30 rounded-full transition-colors relative" title="Google Drive Sync">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>
                <span id="cloud-status-indicator" class="absolute top-1 right-1 w-2 h-2 bg-gray-300 rounded-full"></span>
            </button>

            <div id="cloud-dropdown" class="absolute top-full right-12 mt-3 w-64 bg-white dark:bg-card border border-gray-200 dark:border-gray-700 rounded-xl shadow-xl flex-col z-50 dropdown-hidden">
                <div class="px-4 py-3 text-xs font-bold text-gray-400 dark:text-gray-500 tracking-wider border-b border-gray-100 dark:border-gray-700 text-center">GOOGLE DRIVE</div>
                <div class="p-2 space-y-1 text-center">
                    <button id="auth_btn" onclick="handleAuthClick()" class="w-full px-3 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14"></path></svg> Accedi a Google
                    </button>
                    <button id="signout_btn" onclick="handleSignoutClick()" class="w-full px-3 py-2 text-sm text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg flex items-center gap-2 hidden">
                         Esci dal Cloud
                    </button>
                    <hr class="border-gray-100 dark:border-gray-700 my-1">
                    <button id="save_drive_btn" onclick="saveToDrive()" class="w-full px-3 py-2 text-sm text-blue-600 dark:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded-lg flex items-center gap-2 disabled:opacity-30 disabled:cursor-not-allowed" disabled>
                        Backup su Cloud
                    </button>
                    <button id="load_drive_btn" onclick="loadFromDrive()" class="w-full px-3 py-2 text-sm text-green-600 dark:text-green-400 hover:bg-green-50 dark:hover:bg-green-900/30 rounded-lg flex items-center gap-2 disabled:opacity-30 disabled:cursor-not-allowed" disabled>
                        Ripristina da Cloud
                    </button>
                </div>
            </div>

            <button onclick="toggleTheme()" class="p-2 text-gray-400 hover:text-gray-900 hover:bg-gray-100 dark:text-gray-500 dark:hover:text-white dark:hover:bg-gray-800 rounded-full transition-colors">
                <svg id="icon-sun" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <svg id="icon-moon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </div>
    </header>

    <main id="pages-view" class="flex-grow p-8 md:p-12 w-full overflow-y-auto relative transition-colors duration-300"></main>

    <div id="no-journals-hint" class="fixed inset-0 flex items-center justify-center text-gray-400 dark:text-gray-600 text-lg pointer-events-none hidden">
        Clicca sul '+' in alto per creare un diario.
    </div>
    <div id="empty-journal-hint" class="fixed inset-0 flex items-center justify-center text-gray-400 dark:text-gray-600 text-lg pointer-events-none hidden mt-20">
        Diario vuoto.<br>Clicca nello spazio vuoto per aggiungere una pagina.
    </div>

    <div id="editor-backdrop" class="fixed inset-0 bg-black/40 dark:bg-black/80 backdrop-blur-sm z-40 flex justify-center items-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div id="editor-container" class="bg-white dark:bg-dark border border-gray-200 dark:border-gray-800 w-full max-w-2xl h-[75vh] rounded-2xl flex flex-col p-6 md:p-10 shadow-2xl transform scale-95 transition-all duration-300 relative">
            
            <div class="flex justify-between items-center mb-4 border-b border-transparent">
                <input type="datetime-local" id="editor-datetime" class="bg-transparent text-gray-500 font-medium text-xs md:text-sm outline-none cursor-pointer hover:text-gray-900 dark:hover:text-gray-300 border-b border-transparent hover:border-gray-300 dark:hover:border-gray-600 pb-1 transition-colors">
                
                <button id="editor-delete-btn" onclick="triggerDeletePage(event)" class="text-gray-400 dark:text-gray-500 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 p-2 rounded-full transition-colors flex-shrink-0" title="Elimina pagina">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>

            <div class="flex flex-col flex-grow">
                <input type="text" id="editor-title" placeholder="Titolo della pagina..." class="bg-transparent border-none text-gray-900 dark:text-white font-serif text-3xl md:text-4xl outline-none mb-6 w-full placeholder-gray-300 dark:placeholder-gray-700 py-1">
                <textarea id="editor-content" placeholder="Inizia a scrivere..." class="bg-transparent border-none text-gray-700 dark:text-gray-300 font-normal text-xl md:text-2xl leading-[1.7] outline-none resize-none flex-grow w-full placeholder-gray-300 dark:placeholder-gray-700 font-playfair"></textarea>
            </div>

    <div id="custom-modal-backdrop" class="fixed inset-0 bg-black/30 dark:bg-black/90 z-50 flex justify-center items-center opacity-0 pointer-events-none transition-opacity duration-200">
        <div class="bg-white dark:bg-card p-8 rounded-xl text-center max-w-sm w-full border border-gray-200 dark:border-gray-700 shadow-2xl transform scale-95 transition-all duration-200" id="modal-box">
            <p id="modal-message" class="text-base text-gray-800 dark:text-gray-200 mb-6">Sei sicuro?</p>
            <div class="flex justify-center gap-4">
                <button id="modal-cancel" class="px-5 py-2 text-sm rounded-lg font-medium text-gray-600 dark:text-gray-300 border border-gray-300 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">Annulla</button>
                <button id="modal-confirm" class="px-5 py-2 text-sm rounded-lg font-medium text-white bg-red-600 hover:bg-red-700 transition-colors shadow-lg">Conferma</button>
            </div>
        </div>
    </div>

    <script>
        /** --- CONFIGURAZIONE GOOGLE DRIVE API --- **/
        // Inserite credenziali fisse
        const CLIENT_ID = '662737937491-or1uo1ui8eohrf7il2s8cve0in8pu4od.apps.googleusercontent.com'; 
        const API_KEY = 'AIzaSyBJ9w0ilvQohKTO1agou-xs3-_ogyz2iIk';
        
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';

        let tokenClient;
        let gapiInited = false;
        let gisInited = false;

        function gapiLoaded() { gapi.load('client', async () => {
            if(!API_KEY) return;
            await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
            gapiInited = true; checkAuthReady();
        });}

        function gisLoaded() {
            if(!CLIENT_ID) return;
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID, scope: SCOPES, callback: (resp) => { 
                    if (resp.error) throw (resp); 
                    
                    // Salvataggio del token in memoria per persistenza al refresh
                    const expiresAt = Date.now() + (resp.expires_in * 1000);
                    localStorage.setItem('gdrive_token', resp.access_token);
                    localStorage.setItem('gdrive_token_expires', expiresAt.toString());
                    
                    checkAuthReady(); 
                },
            });
            gisInited = true; checkAuthReady();
        }

        function checkAuthReady() { 
            if(gapiInited && gisInited) {
                // Controllo se esiste un token valido salvato in memoria
                const savedToken = localStorage.getItem('gdrive_token');
                const expiresAt = localStorage.getItem('gdrive_token_expires');

                if (savedToken && expiresAt && Date.now() < parseInt(expiresAt)) {
                    // Token ancora valido, re-iniettiamo nelle API senza chiedere login
                    gapi.client.setToken({ access_token: savedToken });
                    updateCloudUI(true);
                } else {
                    // Token inesistente o scaduto
                    localStorage.removeItem('gdrive_token');
                    localStorage.removeItem('gdrive_token_expires');
                    updateCloudUI(false);
                }
            } 
        }

        function updateCloudUI(isAuthed) {
            document.getElementById('auth_btn').classList.toggle('hidden', isAuthed);
            document.getElementById('signout_btn').classList.toggle('hidden', !isAuthed);
            document.getElementById('save_drive_btn').disabled = !isAuthed;
            document.getElementById('load_drive_btn').disabled = !isAuthed;
            document.getElementById('cloud-status-indicator').className = `absolute top-1 right-1 w-2 h-2 rounded-full ${isAuthed ? 'bg-green-500' : 'bg-gray-400'}`;
        }

        function handleAuthClick() { tokenClient.requestAccessToken({prompt: gapi.client.getToken() === null ? 'consent' : ''}); }
        
        function handleSignoutClick() { 
            const token = gapi.client.getToken(); 
            if (token) { 
                google.accounts.oauth2.revoke(token.access_token); 
                gapi.client.setToken(''); 
            }
            localStorage.removeItem('gdrive_token');
            localStorage.removeItem('gdrive_token_expires');
            updateCloudUI(false); 
        }

        const BACKUP_NAME = 'carodiario_backup.json';

        async function saveToDrive() {
            try {
                const list = await gapi.client.drive.files.list({ spaces: 'appDataFolder', q: `name='${BACKUP_NAME}'` });
                const fileId = list.result.files.length > 0 ? list.result.files[0].id : null;
                const metadata = { name: BACKUP_NAME, mimeType: 'application/json', parents: ['appDataFolder'] };
                const fileContent = JSON.stringify(journals);

                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                form.append('file', new Blob([fileContent], { type: 'application/json' }));

                const url = fileId ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart` : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
                const res = await fetch(url, { method: fileId ? 'PATCH' : 'POST', headers: { Authorization: 'Bearer ' + gapi.client.getToken().access_token }, body: form });
                if (res.ok) alert("Backup sincronizzato con successo su Google Drive!"); else throw new Error();
            } catch (e) { alert("Errore durante il backup. La sessione potrebbe essere scaduta, prova a rifare il login."); }
        }

        async function loadFromDrive() {
            showConfirm("Questo sovrascriverà tutti i tuoi dati attuali. Procedere?", async () => {
                try {
                    const list = await gapi.client.drive.files.list({ spaces: 'appDataFolder', q: `name='${BACKUP_NAME}'` });
                    if (list.result.files.length === 0) return alert("Nessun backup trovato su questo account Google.");
                    const response = await gapi.client.drive.files.get({ fileId: list.result.files[0].id, alt: 'media' });
                    if (Array.isArray(response.result)) { 
                        journals = response.result; 
                        activeJournalId = journals[0]?.id || null; 
                        saveData(); 
                        renderApp(); 
                        alert("Dati ripristinati correttamente!"); 
                    }
                } catch (e) { alert("Errore nel ripristino. Riprova ad effettuare il login."); }
            });
        }


        /** --- LOGICA CORE APP --- **/
        let journals = JSON.parse(localStorage.getItem('carodiario_data')) || [];
        let activeJournalId = localStorage.getItem('carodiario_active_id') || null;
        let currentPageId = null; let confirmCallback = null;

        const pagesView = document.getElementById('pages-view');
        const currentTitleText = document.getElementById('current-title-text');
        const titleInput = document.getElementById('title-input');
        const journalListEl = document.getElementById('journal-list');
        const editorBackdrop = document.getElementById('editor-backdrop');
        const editorContainer = document.getElementById('editor-container');
        const editorTitle = document.getElementById('editor-title');
        const editorContent = document.getElementById('editor-content');
        const editorDatetime = document.getElementById('editor-datetime');

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function renderApp() { renderHeader(); renderPagesGrid(); }

        function renderHeader() {
            const journal = journals.find(j => j.id === activeJournalId);
            currentTitleText.innerText = journal?.title || "Nessun Diario";
            document.getElementById('edit-title-btn').classList.toggle('hidden', !journal);
            document.getElementById('dropdown-delete-section').classList.toggle('hidden', !journal);
            
            journalListEl.innerHTML = journals.sort((a,b) => b.timestamp - a.timestamp).map(j => `
                <li onclick="selectJournal('${j.id}')" class="px-3 py-2 rounded-lg cursor-pointer truncate text-sm font-medium ${j.id === activeJournalId ? 'bg-gray-900 text-white dark:bg-gray-800' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800/50'}">
                    ${j.title || 'Senza Titolo'}
                </li>`).join('') || '<li class="text-center text-xs text-gray-400 py-2 italic">Nessun diario</li>';
        }

        function renderPagesGrid() {
            pagesView.innerHTML = '';
            document.getElementById('no-journals-hint').classList.toggle('hidden', journals.length > 0);
            const journal = journals.find(j => j.id === activeJournalId);
            if(!journal) return;
            document.getElementById('empty-journal-hint').classList.toggle('hidden', journal.pages.length > 0);

            const sorted = [...journal.pages].sort((a,b) => b.timestamp - a.timestamp);
            let curDate = ''; let curGrid = null;

            sorted.forEach(p => {
                const dateStr = new Date(p.timestamp).toLocaleDateString('it-IT', { day:'numeric', month:'long', year:'numeric'});
                if(dateStr !== curDate) {
                    const h = document.createElement('h2'); h.className='w-full text-lg font-light text-gray-400 mt-6 mb-4 border-b border-gray-100 dark:border-gray-800 pb-2';
                    h.innerText = dateStr; pagesView.appendChild(h);
                    curGrid = document.createElement('div'); curGrid.className='grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-8';
                    pagesView.appendChild(curGrid); curDate = dateStr;
                }
                const card = document.createElement('div');
                card.className = 'bg-white dark:bg-card border border-gray-100 dark:border-transparent hover:border-gray-300 dark:hover:border-gray-700 transition-all rounded-2xl p-5 h-48 flex flex-col cursor-pointer group shadow-sm';
                card.onclick = () => openPage(p.id);
                card.innerHTML = `
                    <div class="font-serif text-lg text-gray-900 dark:text-gray-200 truncate mb-1">${p.title || 'Senza Titolo'}</div>
                    <div class="text-gray-500 dark:text-gray-400 text-sm leading-relaxed flex-grow overflow-hidden line-clamp-4 font-playfair">${escapeHTML(p.content) || '<span class="opacity-30 italic font-sans text-xs">Vuota</span>'}</div>
                    <div class="mt-3 flex justify-between items-center text-[10px] text-gray-400 border-t border-gray-50 dark:border-gray-800 pt-3">
                        <span>${new Date(p.timestamp).toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'})}</span>
                        <button onclick="event.stopPropagation(); showConfirm('Eliminare la pagina?', ()=>deletePage('${p.id}'))" class="opacity-0 group-hover:opacity-100 text-red-400 p-1 hover:bg-red-50 dark:hover:bg-red-900/20 rounded">Elimina</button>
                    </div>`;
                curGrid.appendChild(card);
            });
        }

        // Toggles Dropdowns
        function toggleDropdown(e) { e.stopPropagation(); document.getElementById('cloud-dropdown').classList.add('dropdown-hidden'); document.getElementById('journal-dropdown').classList.toggle('dropdown-hidden'); document.getElementById('journal-dropdown').classList.toggle('dropdown-visible'); }
        function toggleCloudDropdown(e) { e.stopPropagation(); document.getElementById('journal-dropdown').classList.add('dropdown-hidden'); document.getElementById('cloud-dropdown').classList.toggle('dropdown-hidden'); document.getElementById('cloud-dropdown').classList.toggle('dropdown-visible'); }
        document.addEventListener('click', () => { document.getElementById('journal-dropdown').classList.add('dropdown-hidden'); document.getElementById('cloud-dropdown').classList.add('dropdown-hidden'); });

        function selectJournal(id) { activeJournalId = id; saveData(); renderApp(); }
        function createNewJournal() { const id = Date.now().toString(); journals.push({id, title:'Nuovo Diario', timestamp:Date.now(), pages:[]}); selectJournal(id); startEditingTitle(); }
        function startEditingTitle() { document.getElementById('title-view').classList.add('hidden'); document.getElementById('title-edit').classList.remove('hidden'); titleInput.value = journals.find(j=>j.id===activeJournalId).title; titleInput.focus(); }
        titleInput.onblur = () => { if(activeJournalId) { journals.find(j=>j.id===activeJournalId).title = titleInput.value.trim() || 'Senza Titolo'; saveData(); } document.getElementById('title-view').classList.remove('hidden'); document.getElementById('title-edit').classList.add('hidden'); renderApp(); };
        function deleteActiveJournal() { showConfirm("Eliminare l'intero diario?", () => { journals = journals.filter(j=>j.id!==activeJournalId); activeJournalId = journals[0]?.id || null; saveData(); renderApp(); }); }

        function openNewPage() { const journal = journals.find(j=>j.id===activeJournalId); if(!journal) return; const id = Date.now().toString(); journal.pages.push({id, title:'', content:'', timestamp:Date.now()}); openPage(id); }
        function openPage(id) { currentPageId = id; const p = journals.find(j=>j.id===activeJournalId).pages.find(pg=>pg.id===id); editorTitle.value = p.title; editorContent.value = p.content; editorDatetime.value = new Date(p.timestamp - (new Date().getTimezoneOffset()*60000)).toISOString().slice(0,16); showEditor(); }
        
        // Risolto bug click sfondo
        function showEditor() { 
            document.body.classList.add('modal-open'); 
            editorBackdrop.classList.remove('opacity-0', 'pointer-events-none'); 
            editorBackdrop.classList.add('opacity-100', 'pointer-events-auto'); 
            editorContainer.classList.remove('scale-95');
            editorContainer.classList.add('scale-100');
        }
        
        function closeEditor() { 
            document.body.classList.remove('modal-open'); 
            editorBackdrop.classList.remove('opacity-100', 'pointer-events-auto'); 
            editorBackdrop.classList.add('opacity-0', 'pointer-events-none'); 
            editorContainer.classList.remove('scale-100');
            editorContainer.classList.add('scale-95');
            cleanEmptyPages(); 
            currentPageId = null; 
        }

        editorBackdrop.addEventListener('click', (e) => {
            if (e.target === editorBackdrop) {
                closeEditor();
            }
        });

        function deletePage(id) { const j = journals.find(j=>j.id===activeJournalId); j.pages = j.pages.filter(p=>p.id!==id); saveData(); renderApp(); }
        function triggerDeletePage(e) {
            e.stopPropagation();
            showConfirm("Vuoi eliminare questa pagina?", () => {
                deletePage(currentPageId);
                closeEditor();
            });
        }
        
        function updatePage() { 
            if(!currentPageId) return;
            const p = journals.find(j=>j.id===activeJournalId).pages.find(pg=>pg.id===currentPageId);
            p.title = editorTitle.value; p.content = editorContent.value; p.timestamp = new Date(editorDatetime.value).getTime();
            saveData(); renderPagesGrid();
        }
        editorTitle.oninput = updatePage; editorContent.oninput = updatePage; editorDatetime.onchange = updatePage;
        
        function cleanEmptyPages() { 
            const j = journals.find(j=>j.id===activeJournalId); 
            if(!j) return;
            const initialLength = j.pages.length;
            j.pages = j.pages.filter(p=> p.title.trim() || p.content.trim()); 
            if(j.pages.length !== initialLength) { saveData(); renderPagesGrid(); }
        }

        function saveData() { localStorage.setItem('carodiario_data', JSON.stringify(journals)); localStorage.setItem('carodiario_active_id', activeJournalId); }
        function escapeHTML(s) { return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m])); }
        
        function showConfirm(m, cb) { 
            document.getElementById('modal-message').innerText = m; 
            confirmCallback = cb; 
            const modal = document.getElementById('custom-modal-backdrop');
            modal.classList.remove('opacity-0', 'pointer-events-none'); 
            modal.classList.add('opacity-100', 'pointer-events-auto'); 
            document.getElementById('modal-box').classList.replace('scale-95', 'scale-100');
        }
        
        document.getElementById('modal-cancel').onclick = () => { 
            const modal = document.getElementById('custom-modal-backdrop');
            modal.classList.remove('opacity-100', 'pointer-events-auto'); 
            modal.classList.add('opacity-0', 'pointer-events-none'); 
            document.getElementById('modal-box').classList.replace('scale-100', 'scale-95');
        };
        
        document.getElementById('modal-confirm').onclick = () => { confirmCallback(); document.getElementById('modal-cancel').onclick(); };

        window.onclick = (e) => { 
            if(!e.target.closest('.note-card') && !e.target.closest('header') && !e.target.closest('#editor-container') && !e.target.closest('#modal-box') && activeJournalId) {
                openNewPage(); 
            }
        };

        renderApp();
    </script>
</body>
</html>
